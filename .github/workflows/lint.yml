name: Code Quality & Linting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 dags/pipeline_dag.py \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E303,E128,E124,E221,E241,E305,F541 \
            --statistics

  sql-lint:
    name: SQL Lint (sqlfluff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Run sqlfluff
        run: |
          sqlfluff lint supplychain360/models/ \
            --dialect snowflake \
            --templater jinja \
            --ignore templating,parsing \
            --exclude-rules LT01,LT02,LT05,LT12,AL01,AL09,CP02,ST02,ST06
