version: 2

sources:
  - name: raw
    database: SUPPLYCHAIN360
    schema: RAW
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    loaded_at_field: null
    tables:
      - name: PRODUCTS
        description: "Product catalog from S3"
        columns:
          - name: PRODUCT_ID
            tests:
              - unique
              - not_null
          - name: PRODUCT_NAME
            tests:
              - not_null
          - name: CATEGORY
            tests:
              - not_null
          - name: UNIT_PRICE
            tests:
              - not_null

      - name: SUPPLIERS
        description: "Supplier reference data from S3"
        columns:
          - name: SUPPLIER_ID
            tests:
              - unique
              - not_null

      - name: WAREHOUSES
        description: "Warehouse locations from S3"
        columns:
          - name: WAREHOUSE_ID
            tests:
              - unique
              - not_null

      - name: INVENTORY
        description: "Daily inventory snapshots from S3"
        columns:
          - name: PRODUCT_ID
            tests:
              - not_null
          - name: WAREHOUSE_ID
            tests:
              - not_null
          - name: QUANTITY_AVAILABLE
            tests:
              - not_null

      - name: SHIPMENTS
        description: "Shipment records from S3"
        columns:
          - name: SHIPMENT_ID
            tests:
              - unique
              - not_null

  - name: sheets
    database: SUPPLYCHAIN360
    schema: SHEETS
    tables:
      - name: SHEET1
        description: "Store data from Google Sheets"
        columns:
          - name: STORE_ID
            tests:
              - unique
              - not_null
          - name: STORE_NAME
            tests:
              - not_null
          - name: REGION
            tests:
              - not_null

  - name: supabase
    database: SUPPLYCHAIN360
    schema: SUPABASE
    tables:
      - name: SALES
        description: "Combined sales transactions from all daily tables"
        columns:
          - name: TRANSACTION_ID
            tests:
              - unique
              - not_null
          - name: STORE_ID
            tests:
              - not_null
          - name: PRODUCT_ID
            tests:
              - not_null
      - name: sales_2026_03_10
        description: "Sales transactions for 2026-03-10"
      - name: sales_2026_03_11
        description: "Sales transactions for 2026-03-11"
      - name: sales_2026_03_12
        description: "Sales transactions for 2026-03-12"
      - name: sales_2026_03_13
        description: "Sales transactions for 2026-03-13"
      - name: sales_2026_03_14
        description: "Sales transactions for 2026-03-14"
      - name: sales_2026_03_15
        description: "Sales transactions for 2026-03-15"
      - name: sales_2026_03_16
        description: "Sales transactions for 2026-03-16"
      - name: CITIES_RAW
        description: "Cities reference data"
      - name: DRIVERS_RAW
        description: "Driver data"
      - name: RIDERS_RAW
        description: "Rider data"
      - name: TRIPS_RAW
        description: "Trip records"
      - name: PAYMENTS_RAW
        description: "Payment records"
      - name: DRIVER_STATUS_EVENTS_RAW
        description: "Driver status events" 
